name: CURIA_pipeline
channels:
  - pytorch
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy>=1.20
  - scipy>=1.7
  - scikit-learn>=0.24
  - pandas>=1.3
  - tqdm>=4.60
  - llvm-openmp  # macOS OpenMP fix

  - pip:
      - pyrion >= 0.3.1  # instead of biopython
      - torch>=1.9
      - ptflops>=0.6  # RNA-FM runtime dependencies
